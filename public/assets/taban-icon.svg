<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background -->
  <rect width="64" height="64" rx="16" fill="#0A3D6B"/>

  <!-- Medical cross -->
  <rect x="23" y="14" width="18" height="36" rx="3" fill="white"/>
  <rect x="14" y="23" width="36" height="18" rx="3" fill="white"/>

  <!-- Inner cross with South Sudan green -->
  <rect x="26" y="17" width="12" height="30" rx="2" fill="#10B944"/>
  <rect x="17" y="26" width="30" height="12" rx="2" fill="#10B944"/>

  <!-- Center star -->
  <circle cx="32" cy="32" r="7" fill="#FCD34D"/>
  <polygon points="32,26.5 33.5,30 37,30 34.2,32.4 35.4,36 32,33.8 28.6,36 29.8,32.4 27,30 30.5,30" fill="#0A3D6B"/>

  <!-- Bottom flag accent -->
  <line x1="14" y1="52" x2="50" y2="52" stroke="#111" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="55" x2="48" y2="55" stroke="#E52E42" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="18" y1="58" x2="46" y2="58" stroke="#10B944" stroke-width="1.5" stroke-linecap="round"/>
</svg>
